  <head>
    <meta charset="UTF-8" />

    <meta

      content="SLISTYLE is a fashion house crafting minimal, elevated essentials for men and women."

    <meta property="og:type" content="website" />
    <meta property="og:title" content="SLISTYLE — Considered clothing for considered lives" />
    <meta
      property="og:description"
      content="SLISTYLE is a fashion house crafting minimal, elevated essentials for men and women."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <title>SLISTYLE — Considered clothing for considered lives</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      try {
        if (
          localStorage.theme === "dark" ||
          (!("theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
